# Nombre de la aplicación
spring.application.name=backend-novaluz

# Configuración de Base de Datos (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/novaluz_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA / Hibernate
# 'update' creará las tablas automáticamente según nuestras clases @Entity
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect